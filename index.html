<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>活動快速報到系統</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            font-size: 1.2rem;
        }

        .main-wrapper {
            display: flex;
            flex-direction: row;
            gap: 20px;
            width: 100vw;
            height: 100vh;
            max-width: 100%;
            max-height: 100%;
            background: #ffffff;
            border-radius: 0;
            overflow: hidden;
            padding: 20px;
        }

        .panel-box {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        /* 左側：活動資訊欄 */
        .info-sidebar { flex: 1; text-align: left; }
        .info-sidebar h3, .history-sidebar h3 { color: #2c3e50; margin-top: 0; font-size: 1.6rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .info-item { margin-bottom: 15px; font-size: 1.2rem; color: #4a5568; line-height: 1.5; }
        .info-item strong { color: #2d3748; display: block; margin-bottom: 3px; }
        .event-img { width: 100%; height: 140px; object-fit: cover; border-radius: 10px; margin-top: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        /* 中間：掃描主畫面 */
        .scanner-section {
            flex: 1.3; display: flex; flex-direction: column; align-items: center;
            justify-content: space-between; text-align: center;
            background: #ffffff; border: 2px dashed #e2e8f0; border-radius: 16px; padding: 20px;
        }
        .scanner-top { width: 100%; display: flex; flex-direction: column; align-items: center; }
        h2 { color: #2c3e50; margin-top: 0; font-size: 1.8rem; margin-bottom: 10px; }

        .scan-trigger-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 15px 20px; border-radius: 12px; font-size: 1.3rem;
            font-weight: bold; width: 100%; cursor: pointer; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            animation: pulseBar 2s infinite; margin-bottom: 10px; transition: transform 0.2s;
        }
        .scan-trigger-bar:hover { transform: scale(1.02); }
        @keyframes pulseBar {
            0% { opacity: 0.9; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.01); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6); }
            100% { opacity: 0.9; transform: scale(1); }
        }

        #reader { width: 100% !important; border: none !important; border-radius: 12px; overflow: hidden; display: none; }
        #reader video { border-radius: 12px; }
        #result-box { margin-top: 10px; padding: 12px; border-radius: 12px; font-size: 1.3rem; font-weight: bold; display: none; width: 100%; }

        .success { background-color: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; }
        .pending { background-color: #fff3cd; color: #856404; border: 2px solid #ffeeba; }

        .bottom-img-box { width: 100%; height: 110px; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,0.05); margin: 10px 0; }
        .bottom-img-box img { width: 100%; height: 100%; object-fit: cover; }

        .clock-container-inline { background: #f8f9fa; padding: 12px 20px; border-radius: 12px; width: 100%; border: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .clock-label-inline { font-size: 1.3rem; font-weight: bold; color: #475569; }
        .live-clock-inline { font-size: 1.8rem; font-weight: bold; color: #1e293b; font-family: monospace; letter-spacing: 1px; }

        /* 右側：即時報到紀錄欄 */
        .history-sidebar { flex: 1; display: flex; flex-direction: column; }
        .stats-box { background: #e2e8f0; padding: 14px; border-radius: 10px; font-size: 1.3rem; font-weight: bold; color: #2c3e50; margin-bottom: 15px; text-align: center; transition: all 0.3s; }
        .history-list { flex: 1; overflow-y: auto; background: #ffffff; border-radius: 10px; padding: 10px; border: 1px solid #e2e8f0; max-height: calc(100vh - 180px); }
        
        .history-item { 
            padding: 12px; 
            border-bottom: 1px solid #f1f5f9; 
            font-size: 1.15rem; 
            color: #334155; 
            text-align: left; 
            animation: fadeIn 0.5s ease-in-out; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-item-text { flex: 1; }
        .history-item strong { color: #0f172a; font-size: 1.25rem; }
        .history-time { font-size: 1.1rem; color: #64748b; font-weight: bold; margin-left: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 1024px) { body { height: auto; padding: 10px; } .main-wrapper { flex-direction: column; height: auto; padding: 15px; } .info-sidebar { display: none; } }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="panel-box info-sidebar">
            <div>
                <h3>📌 活動資訊</h3>
                <div class="info-item"><strong>活動名稱：</strong><span>智慧運輸與永續發展研討會</span></div>
                <div class="info-item"><strong>報到時間：</strong><span>08:30 - 09:00</span></div>
                <div class="info-item"><strong>注意事項：</strong><span>系統具備防重複報到機制。</span></div>
            </div>
            <img src="https://images.unsplash.com/photo-1511578314322-379afb476865?auto=format&fit=crop&w=600&q=80" alt="活動圖片" class="event-img">
        </div>

        <div class="scanner-section">
            <div class="scanner-top">
                <h2>📷 快速報到掃描台</h2>
                <div id="scan-trigger-bar" class="scan-trigger-bar" onclick="startCamera()">👉 點擊此處展開相機對準掃描區掃描</div>
                <div id="reader"></div>
                <div id="result-box"></div>
            </div>

            <div class="bottom-img-box">
                <img src="https://images.unsplash.com/photo-1505373877841-8d25f7d46678?auto=format&fit=crop&w=600&q=80" alt="下方插圖">
            </div>

            <div class="clock-container-inline">
                <span class="clock-label-inline">目前時間：</span>
                <span id="live-clock" class="live-clock-inline">00:00:00</span>
            </div>
        </div>

        <div class="panel-box history-sidebar">
            <div>
                <h3>📋 即時報到動態</h3>
                <div class="stats-box" id="stats-counter">目前報到人數：計算中...</div>
            </div>
            <div class="history-list" id="history-list">
                <div style="color: #94a3b8; text-align: center; margin-top: 30px; font-size: 1.1rem;">🔄 連線至資料庫中...</div>
            </div>
        </div>
    </div>

    <script>
        // 👇👇👇 請將單引號裡面的內容，替換成您剛剛發佈新版本的專屬網址 👇👇👇
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyamn06IZbBiDqd44zs-vzlAlIB_TdNLzNPY1voyoPKrMGqUuhrSk0B4PQKRUJl66rv/exec'; 
        
        let html5QrCode;
        let isProcessing = false;

        // 即時時鐘
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('live-clock').innerText = `${hours}:${minutes}:${seconds}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 開啟相機
        function startCamera() {
            document.getElementById('scan-trigger-bar').style.display = 'none';
            document.getElementById('reader').style.display = 'block';
            
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 180, height: 180 } },
                (decodedText) => {
                    if (isProcessing) return;
                    isProcessing = true;
                    html5QrCode.pause(); 
                    sendToCheckIn(decodedText);
                }
            ).catch(err => alert("相機啟動失敗，請確認是否允許相機權限"));
        }

        // 發送報到資料
        function sendToCheckIn(qrId) {
            const resultBox = document.getElementById('result-box');
            resultBox.style.display = 'block';
            resultBox.className = 'pending';
            resultBox.innerText = `⏳ 資料傳送中...`;

            fetch(`${GAS_URL}?guest_id=${encodeURIComponent(qrId)}`, { method: 'GET', redirect: "follow" })
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success') {
                    resultBox.className = 'success';
                    resultBox.innerHTML = `✅ 報到完成！<br><span style="font-size: 1.2rem; color: #2d3748;">來賓：${data.guest_name}</span>`;
                    syncData(); // 主動觸發一次後台資料更新
                } else {
                    resultBox.className = 'error';
                    resultBox.innerText = `❌ ${data.message}`;
                }

                setTimeout(() => {
                    resultBox.style.display = 'none';
                    if (html5QrCode) {
                        html5QrCode.resume();
                        isProcessing = false;
                    }
                }, 1500);
            })
            .catch(error => {
                resultBox.className = 'error';
                resultBox.innerText = `❌ 連線錯誤`;
                setTimeout(() => {
                    resultBox.style.display = 'none';
                    if (html5QrCode) {
                        html5QrCode.resume();
                        isProcessing = false;
                    }
                }, 2000);
            });
        }

        // 核心同步引擎：定期向試算表請求最新資料
        function syncData() {
            fetch(`${GAS_URL}?action=sync`, { method: 'GET', redirect: "follow" })
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success') {
                    // 1. 完全依照後台的總數來更新人數
                    document.getElementById('stats-counter').innerText = `目前報到人數：${data.count} 人`;
                    
                    // 2. 更新右側歷史紀錄
                    const historyList = document.getElementById('history-list');
                    historyList.innerHTML = ''; 
                    
                    if (data.history.length === 0) {
                        historyList.innerHTML = `<div style="color: #94a3b8; text-align: center; margin-top: 30px; font-size: 1.1rem;">尚無報到紀錄</div>`;
                    } else {
                        data.history.forEach(item => {
                            const newItem = document.createElement('div');
                            newItem.className = 'history-item';
                            // 依照您的要求，更改顯示文字與排版 (時間放在最右側)
                            newItem.innerHTML = `
                                <div class="history-item-text">貴賓 <strong>${item.name}</strong> 報到成功 歡迎您！</div>
                                <div class="history-time">${item.time}</div>
                            `;
                            historyList.appendChild(newItem);
                        });
                    }
                }
            })
            .catch(err => console.log("背景同步失敗:", err));
        }

        // 網頁一載入，馬上跟後台拉取真實資料
        syncData();
        
        // 每隔 3 秒鐘，自動去後台拉一次資料 (維持電腦與手機畫面同步)
        setInterval(syncData, 3000);

    </script>
</body>
</html>
