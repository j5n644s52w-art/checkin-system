<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>活動報到掃描台</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #f4f4f9;
        }
        h2 { color: #333; }
        #reader {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            display: none; /* 一開始先隱藏相機畫面 */
        }
        #result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: bold;
            display: none;
        }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .pending { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        
        button {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 1.2em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            display: none;
        }
        /* 自訂按鈕樣式 */
        #start-camera-btn { background-color: #343a40; color: white; display: inline-block; }
        #confirm-btn { background-color: #28a745; color: white; }
        #next-btn { background-color: #007bff; color: white; }
    </style>
</head>
<body>

    <h2>工作人員報到掃描台</h2>
    
    <!-- 我們自己做的強制啟動按鈕 -->
    <button id="start-camera-btn" onclick="startCamera()">📷 點我開啟相機</button>
    
    <div id="reader"></div>
    <div id="result-box"></div>
    
    <button id="confirm-btn" onclick="sendToCheckIn()">確認報到</button>
    <button id="next-btn" onclick="resetScanner()">掃描下一位</button>

    <script>
        let html5QrCode;
        let currentScannedId = ""; 

        // 步驟零：點擊自訂按鈕後，強制啟動後置鏡頭
        function startCamera() {
            const startBtn = document.getElementById('start-camera-btn');
            const readerDiv = document.getElementById('reader');
            
            startBtn.style.display = 'none'; // 隱藏按鈕
            readerDiv.style.display = 'block'; // 顯示相機區塊

            // 使用底層 API 直接呼叫相機
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" }, // 強制使用後置鏡頭
                { fps: 10, qrbox: { width: 250, height: 250 } },
                onScanSuccess,
                onScanFailure
            ).catch(err => {
                alert("無法開啟相機，請確認您已允許瀏覽器使用相機權限！");
                startBtn.style.display = 'inline-block';
                readerDiv.style.display = 'none';
            });
        }

        // 步驟一：掃描成功後，暫停畫面並顯示確認按鈕
        function onScanSuccess(decodedText, decodedResult) {
            html5QrCode.pause(); 
            currentScannedId = decodedText; 

            const resultBox = document.getElementById('result-box');
            const confirmBtn = document.getElementById('confirm-btn');
            const nextBtn = document.getElementById('next-btn');

            resultBox.style.display = 'block';
            resultBox.className = 'pending';
            resultBox.innerText = `讀取成功！\n代碼：${decodedText}\n請核對後點擊下方「確認報到」`;
            
            confirmBtn.style.display = 'inline-block'; 
            nextBtn.style.display = 'none'; 
        }

        // 步驟二：點擊確認報到後，將資料傳送到 GAS 後端
        function sendToCheckIn() {
            const resultBox = document.getElementById('result-box');
            const confirmBtn = document.getElementById('confirm-btn');
            const nextBtn = document.getElementById('next-btn');

            resultBox.innerText = `資料傳送中...請稍候`;
            confirmBtn.style.display = 'none'; 

            // 👇👇👇 這裡請務必替換成您的 Apps Script API 網址 👇👇👇
            fetch('https://script.google.com/macros/s/AKfycbz_R8gs_xZG_Knc7vzWaSO2ceO7UNnLRkLDP_TTisQ/dev', {
                method: 'POST',
                body: JSON.stringify({ guest_id: currentScannedId })
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success') {
                    resultBox.className = 'success';
                    resultBox.innerText = `✅ 報到完成！\n來賓：${data.guest_name}`;
                } else {
                    resultBox.className = 'error';
                    resultBox.innerText = `❌ ${data.message}\n${data.guest_name ? '來賓：' + data.guest_name : ''}`;
                }
                nextBtn.style.display = 'inline-block'; 
            })
            .catch(error => {
                resultBox.className = 'error';
                resultBox.innerText = `連線錯誤，請檢查網路`;
                nextBtn.style.display = 'inline-block';
            });
        }

        function onScanFailure(error) {
            // 略過錯誤，讓相機繼續抓取
        }

        // 步驟三：點擊「掃描下一位」後重置畫面並恢復掃描
        function resetScanner() {
            document.getElementById('result-box').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            html5QrCode.resume(); 
        }
    </script>
</body>
</html>
