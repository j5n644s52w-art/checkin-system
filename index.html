<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>活動快速報到系統</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            font-size: 1.2rem;
        }

        .main-wrapper {
            display: flex;
            flex-direction: row;
            gap: 20px;
            width: 100vw;
            height: 100vh;
            max-width: 100%;
            max-height: 100%;
            background: #ffffff;
            border-radius: 0;
            box-shadow: none;
            overflow: hidden;
            padding: 20px;
        }

        .panel-box {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        /* 左側：活動資訊欄 */
        .info-sidebar {
            flex: 1;
            text-align: left;
        }

        .info-sidebar h3, .history-sidebar h3 {
            color: #2c3e50;
            margin-top: 0;
            font-size: 1.6rem;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }

        .info-item {
            margin-bottom: 15px;
            font-size: 1.2rem;
            color: #4a5568;
            line-height: 1.5;
        }

        .info-item strong {
            color: #2d3748;
            display: block;
            margin-bottom: 3px;
        }

        .event-img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 10px;
            margin-top: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* 中間：實體掃描器專用主畫面 (上中下三區塊) */
        .scanner-section {
            flex: 1.3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            text-align: center;
            background: #ffffff;
            border: 2px dashed #e2e8f0;
            border-radius: 16px;
            padding: 20px;
        }

        .scanner-top {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        h2 { 
            color: #2c3e50; 
            margin-top: 0;
            font-size: 2rem;
            margin-bottom: 15px;
        }

        /* 提示工作人員使用實體掃描器刷碼的框框 */
        .scanner-instruction {
            background: #e0f2fe;
            color: #0369a1;
            padding: 25px;
            border-radius: 12px;
            font-size: 1.4rem;
            font-weight: bold;
            width: 100%;
            border: 2px solid #bae6fd;
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        #result-box { 
            margin-top: 10px; 
            padding: 15px; 
            border-radius: 12px; 
            font-size: 1.4rem; 
            font-weight: bold; 
            display: none; 
            width: 100%;
        }

        .success { background-color: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; }
        .pending { background-color: #fff3cd; color: #856404; border: 2px solid #ffeeba; }

        /* 中間：左右並排的大時鐘 */
        .clock-container-inline {
            background: #f8f9fa;
            padding: 15px 20px;
            border-radius: 12px;
            width: 100%;
            border: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
        }
        .clock-label-inline {
            font-size: 1.4rem;
            font-weight: bold;
            color: #475569;
        }
        .live-clock-inline {
            font-size: 2rem;
            font-weight: bold;
            color: #1e293b;
            font-family: monospace;
            letter-spacing: 1px;
        }

        /* 下方：自訂圖片插槽 */
        .bottom-img-box {
            width: 100%;
            height: 120px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .bottom-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 右側：即時報到紀錄欄 */
        .history-sidebar {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .stats-box {
            background: #e2e8f0;
            padding: 14px;
            border-radius: 10px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 15px;
            text-align: center;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            background: #ffffff;
            border-radius: 10px;
            padding: 10px;
            border: 1px solid #e2e8f0;
            max-height: calc(100vh - 180px);
        }

        .history-item {
            padding: 12px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 1.15rem;
            color: #334155;
            text-align: left;
            animation: fadeIn 0.3s ease-in-out;
        }

        .history-item strong {
            color: #0f172a;
            font-size: 1.25rem;
        }

        .history-time {
            font-size: 1rem;
            color: #64748b;
            margin-top: 5px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 1024px) {
            body { height: auto; padding: 10px; }
            .main-wrapper {
                flex-direction: column;
                height: auto;
                padding: 15px;
            }
            .info-sidebar { display: none; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <!-- 左側：活動資訊欄 -->
        <div class="panel-box info-sidebar">
            <div>
                <h3>📌 活動資訊</h3>
                <div class="info-item">
                    <strong>活動名稱：</strong>
                    <span>智慧運輸與永續發展研討會</span>
                </div>
                <div class="info-item">
                    <strong>報到時間：</strong>
                    <span>08:30 - 09:00</span>
                </div>
                <div class="info-item">
                    <strong>注意事項：</strong>
                    <span>系統具備防重複報到機制。</span>
                </div>
            </div>
            <img src="https://images.unsplash.com/photo-1511578314322-379afb476865?auto=format&fit=crop&w=600&q=80" alt="活動圖片" class="event-img">
        </div>

        <!-- 中間：實體掃描器專用主畫面 -->
        <div class="scanner-section">
            <div class="scanner-top">
                <h2>⚡ 實體掃描槍報到台</h2>
                <div class="scanner-instruction">
                    請直接使用掃描槍刷取來賓 QR Code 條碼
                </div>
                <div id="result-box"></div>
            </div>

            <!-- 中間：左右並排的大時鐘 -->
            <div class="clock-container-inline">
                <span class="clock-label-inline">目前時間：</span>
                <span id="live-clock" class="live-clock-inline">00:00:00</span>
            </div>

            <!-- 下方：您可自行更換 src 網址來插入圖片 -->
            <div class="bottom-img-box">
                <img src="https://images.unsplash.com/photo-1505373877841-8d25f7d46678?auto=format&fit=crop&w=600&q=80" alt="下方插圖">
            </div>
        </div>

        <!-- 右側：即時報到紀錄與人數統計 -->
        <div class="panel-box history-sidebar">
            <div>
                <h3>📋 即時報到動態</h3>
                <div class="stats-box" id="stats-counter">目前報到人數：0 人</div>
            </div>
            <div class="history-list" id="history-list">
                <div style="color: #94a3b8; text-align: center; margin-top: 30px; font-size: 1.1rem;">尚無報到紀錄</div>
            </div>
        </div>
    </div>

    <script>
        let checkInCount = 0;
        let scannedBuffer = '';
        let lastKeyTime = Date.now();

        // 即時時鐘
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('live-clock').innerText = `${hours}:${minutes}:${seconds}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 監聽實體掃描槍輸入（掃描槍會像鍵盤一樣快速連續輸入字元並以 Enter 結尾）
        document.addEventListener('keypress', function(e) {
            const currentTime = Date.now();
            
            // 如果距離上一個字元超過 100 毫秒，代表可能是人工手動打字，重置緩衝區
            if (currentTime - lastKeyTime > 100) {
                scannedBuffer = '';
            }
            lastKeyTime = currentTime;

            if (e.key === 'Enter') {
                if (scannedBuffer.trim().length > 0) {
                    sendToCheckIn(scannedBuffer.trim());
                    scannedBuffer = '';
                }
            } else {
                scannedBuffer += e.key;
            }
        });

        function sendToCheckIn(qrId) {
            const resultBox = document.getElementById('result-box');
            resultBox.style.display = 'block';
            resultBox.className = 'pending';
            resultBox.innerText = `⏳ 資料傳送中...`;

            // 👇👇👇 請確保這裡填入您完整的 GAS 網址 👇👇👇
            const url = 'https://script.google.com/macros/s/AKfycbyamn06IZbBiDqd44zs-vzlAlIB_TdNLzNPY1voyoPKrMGqUuhrSk0B4PQKRUJl66rv/exec'; 

            fetch(`${url}?guest_id=${encodeURIComponent(qrId)}`, {
                method: 'GET',
                redirect: "follow"
            })
            .then(response => response.json())
            .then(data => {
                const now = new Date();
                const timeString = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;

                if(data.status === 'success') {
                    resultBox.className = 'success';
                    resultBox.innerHTML = `✅ 報到完成！<br><span style="font-size: 1.3rem; color: #2d3748;">貴賓：${data.guest_name}</span>`;
                    
                    checkInCount++;
                    document.getElementById('stats-counter').innerText = `目前報到人數：${checkInCount} 人`;
                    
                    const historyList = document.getElementById('history-list');
                    if (checkInCount === 1) {
                        historyList.innerHTML = '';
                    }
                    
                    const newItem = document.createElement('div');
                    newItem.className = 'history-item';
                    newItem.innerHTML = `貴賓 <strong>${data.guest_name}</strong> 完成報到！<div class="history-time">報到時間：${timeString}</div>`;
                    historyList.prepend(newItem);

                } else {
                    resultBox.className = 'error';
                    resultBox.innerText = `❌ ${data.message}`;
                }

                // 顯示結果 1.5 秒後自動隱藏，準備迎接下一位
                setTimeout(() => {
                    resultBox.style.display = 'none';
                }, 1500);
            })
            .catch(error => {
                resultBox.className = 'error';
                resultBox.innerText = `❌ 連線錯誤，請檢查網路`;
                console.error('Error:', error);

                setTimeout(() => {
                    resultBox.style.display = 'none';
                }, 2000);
            });
        }
    </script>
</body>
</html>
