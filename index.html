<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>活動報到掃描台</title>
    <!-- 載入 QR Code 掃描套件 -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #f4f4f9;
        }
        h2 { color: #333; }
        #reader {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        #result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: bold;
            display: none;
        }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .pending { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        
        button {
            margin-top: 20px;
            padding: 12px 24px;
            font-size: 1.1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: none;
            font-weight: bold;
        }
        #confirm-btn { background-color: #28a745; color: white; }
        #next-btn { background-color: #007bff; color: white; }
    </style>
</head>
<body>

    <h2>工作人員報到掃描台</h2>
    
    <div id="reader"></div>
    <div id="result-box"></div>
    
    <button id="confirm-btn" onclick="sendToCheckIn()">確認報到</button>
    <button id="next-btn" onclick="resetScanner()">掃描下一位</button>

    <script>
        let html5QrcodeScanner;
        let currentScannedId = ""; 

        // 步驟一：掃描成功後，暫停畫面並顯示確認按鈕
        function onScanSuccess(decodedText, decodedResult) {
            html5QrcodeScanner.pause(); 
            currentScannedId = decodedText; 

            const resultBox = document.getElementById('result-box');
            const confirmBtn = document.getElementById('confirm-btn');
            const nextBtn = document.getElementById('next-btn');

            resultBox.style.display = 'block';
            resultBox.className = 'pending';
            resultBox.innerText = `讀取成功！\n代碼：${decodedText}\n請核對後點擊下方「確認報到」`;
            
            confirmBtn.style.display = 'inline-block'; 
            nextBtn.style.display = 'none'; 
        }

        // 步驟二：點擊確認報到後，將資料傳送到 GAS 後端
        function sendToCheckIn() {
            const resultBox = document.getElementById('result-box');
            const confirmBtn = document.getElementById('confirm-btn');
            const nextBtn = document.getElementById('next-btn');

            resultBox.innerText = `資料傳送中...請稍候`;
            confirmBtn.style.display = 'none'; 

            // 👇👇👇 請將下方的網址替換成您部署好的 Apps Script API 網址 👇👇👇
            fetch('https://script.google.com/macros/s/AKfycbz_R8gs_xZG_Knc7vzWaSO2ceO7UNnLRkLDP_TTisQ/dev', {
                method: 'POST',
                body: JSON.stringify({ guest_id: currentScannedId })
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success') {
                    resultBox.className = 'success';
                    resultBox.innerText = `✅ 報到完成！\n來賓：${data.guest_name}`;
                } else {
                    resultBox.className = 'error';
                    resultBox.innerText = `❌ ${data.message}\n${data.guest_name ? '來賓：' + data.guest_name : ''}`;
                }
                nextBtn.style.display = 'inline-block'; 
            })
            .catch(error => {
                resultBox.className = 'error';
                resultBox.innerText = `連線錯誤，請檢查網路`;
                nextBtn.style.display = 'inline-block';
            });
        }

        function onScanFailure(error) {
            // 略過錯誤，讓相機繼續抓取
        }

        // 初始化掃描器
        html5QrcodeScanner = new Html5QrcodeScanner(
            "reader",
            { fps: 10, qrbox: {width: 250, height: 250}, supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA] },
            false
        );
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);

        // 步驟三：點擊「掃描下一位」後重置畫面並恢復掃描
        function resetScanner() {
            document.getElementById('result-box').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            html5QrcodeScanner.resume(); 
        }
    </script>
</body>
</html>
