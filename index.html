<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 設定 viewport 確保在手機上能正確顯示比例 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>活動報到掃描台</title>
    <!-- 載入 html5-qrcode 套件 -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #f4f4f9;
        }
        h2 { color: #333; }
        /* 掃描器外框設定 */
        #reader {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        /* 掃描結果顯示區 */
        #result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: bold;
            display: none; /* 預設隱藏，掃描成功才顯示 */
        }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            display: none;
        }
    </style>
</head>
<body>

    <h2>工作人員報到掃描台</h2>
    
    <!-- 攝影機掃描畫面會渲染在這個 div 裡 -->
    <div id="reader"></div>
    
    <!-- 顯示掃描結果 -->
    <div id="result-box"></div>
    
    <!-- 繼續掃描下一位的按鈕 -->
    <button id="next-btn" onclick="resetScanner()">掃描下一位</button>

    <script>
        let html5QrcodeScanner;

        // 當掃描成功時會觸發這個函式
        function onScanSuccess(decodedText, decodedResult) {
            // 1. 暫停掃描，避免同一個 QR code 瞬間重複送出
            html5QrcodeScanner.pause();

            const resultBox = document.getElementById('result-box');
            const nextBtn = document.getElementById('next-btn');

            // 2. 顯示掃描結果
            resultBox.style.display = 'block';
            resultBox.className = 'success';
            resultBox.innerText = `掃描成功！\n來賓代碼：${decodedText}\n資料傳送中...`;
            nextBtn.style.display = 'inline-block';

            // 3. 將資料傳送到後端資料庫 (此處為模擬示範)
            /* 
            實際應用時，您會使用 fetch API 將 decodedText 傳給您的後端（如 Python 伺服器或 Google Apps Script）
            
            fetch('https://script.google.com/macros/s/AKfycbyH3freBqsLFotR3ERhVjL3pJtnQuo0RMHo-Ja_d3e0s-CPinkyUFd7ylPeI7duyTK5/exec', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ guest_id: decodedText, timestamp: new Date().toISOString() })
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success') {
                    resultBox.innerText = `報到完成！\n來賓：${data.guest_name}`;
                } else {
                    resultBox.className = 'error';
                    resultBox.innerText = `報到失敗：${data.message}`;
                }
            });
            */
        }

        // 當畫面中沒有找到 QR code，或解析失敗時觸發 (通常略過即可，讓相機繼續抓取)
        function onScanFailure(error) {
            // console.warn(`Code scan error = ${error}`);
        }

        // 初始化掃描器設定
        html5QrcodeScanner = new Html5QrcodeScanner(
            "reader",
            { 
                fps: 10, // 每秒掃描次數
                qrbox: {width: 250, height: 250}, // 掃描框大小
                supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
            },
            false // 不顯示詳細的 log
        );
        
        // 啟動掃描器
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);

        // 點擊「掃描下一位」重新啟動
        function resetScanner() {
            document.getElementById('result-box').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            html5QrcodeScanner.resume();
        }
    </script>
</body>
</html>
