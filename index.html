<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>活動報到掃描台</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        /* 基礎設定：確保頁面置中且背景乾淨 */
        body { font-family: 'Noto Sans TC', sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9; margin: 0; }
        
        h2 { color: #333; margin-bottom: 20px; }

        /* 掃描區域容器 */
        #reader { 
            width: 100%; 
            /* --- 核心修改 --- */
            /* 手機版維持原本大小（或稍大），電腦版允許放到最大 800px */
            max-width: 800px; 
            /* ---------------- */
            margin: 0 auto; 
            background-color: #fff; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); /* 增加一點陰影讓質感更好 */
            display: none; 
            overflow: hidden; /* 確保相機畫面不會超出圓角 */
        }

        /* 這裡隱藏了 html5-qrcode 預設的檔案上傳按鈕，只保留相機 */
        #reader__scan_region {
            display: flex;
            justify-content: center;
        }
        /* 調整相機預覽框的樣式，讓它填滿容器 */
        #reader video {
            width: 100% !important;
            height: auto !important;
            object-fit: cover; /* 確保畫面不變形地填滿 */
        }
        /* 隱藏不需要的控制列 */
        #reader__scan_region::-webkit-file-upload-button {
            visibility: hidden;
        }

        /* 結果顯示框 */
        #result-box { 
            margin-top: 20px; 
            padding: 20px; 
            border-radius: 12px; 
            font-size: 1.3em; 
            font-weight: bold; 
            display: none; 
            word-break: break-all; 
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .pending { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }

        /* 按鈕樣式 */
        button { 
            margin-top: 25px; 
            padding: 18px 40px; 
            font-size: 1.2em; 
            border: none; 
            border-radius: 50px; /* 圓角按鈕 */
            cursor: pointer; 
            font-weight: bold; 
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        #start-camera-btn { background-color: #28a745; color: white; } /* 改用綠色看起來更有活力 */
    </style>
</head>
<body>

    <h2>工作人員報到掃描台</h2>
    <button id="start-camera-btn" onclick="startCamera()">📷 點我開啟相機</button>
    
    <div id="reader"></div>
    <div id="result-box"></div>

    <script>
        let html5QrCode;
        let isProcessing = false; // 防連點鎖

        function startCamera() {
            document.getElementById('start-camera-btn').style.display = 'none';
            document.getElementById('reader').style.display = 'block';
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    if (isProcessing) return;
                    isProcessing = true;

                    // 暫停相機並發送
                    html5QrCode.pause(); 
                    sendToCheckIn(decodedText);
                }
            ).catch(err => alert("相機啟動失敗，請確認權限"));
        }

        function sendToCheckIn(qrId) {
            const resultBox = document.getElementById('result-box');
            resultBox.style.display = 'block';
            resultBox.className = 'pending';
            resultBox.innerText = `資料傳送中...`;

            // 👇👇👇 請確保這裡填入您完整的 GAS 網址 👇👇👇
            const url = 'https://script.google.com/macros/s/AKfycbyamn06IZbBiDqd44zs-vzlAlIB_TdNLzNPY1voyoPKrMGqUuhrSk0B4PQKRUJl66rv/exec'; 

            // 改用 fetch 抓取資料，這不會殘留垃圾標籤
            fetch(`${url}?guest_id=${encodeURIComponent(qrId)}`, {
                method: 'GET',
                redirect: "follow"
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success') {
                    resultBox.className = 'success';
                    resultBox.innerText = `✅ 報到完成！\n來賓：${data.guest_name}`;
                } else {
                    resultBox.className = 'error';
                    resultBox.innerText = `❌ ${data.message}`;
                }

                // 停留 1.5 秒讓工作人員看清楚，自動恢復相機掃下一位
                setTimeout(() => {
                    resultBox.style.display = 'none';
                    html5QrCode.resume();
                    isProcessing = false;
                }, 1500);
            })
            .catch(error => {
                resultBox.className = 'error';
                resultBox.innerText = `❌ 連線錯誤`;
                console.error('Error:', error);

                // 發生錯誤也自動恢復，絕不卡死
                setTimeout(() => {
                    resultBox.style.display = 'none';
                    html5QrCode.resume();
                    isProcessing = false;
                }, 2000);
            });
        }
    </script>
</body>
</html>
